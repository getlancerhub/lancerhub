# docker-compose.override.yml
# This file is automatically loaded by docker-compose for local development
# It provides development-specific overrides while keeping production config clean

services:
  postgres:
    ports:
      - "5432:5432"  # Expose postgres for local development/debugging
    environment:
      # Override with development-friendly settings
      POSTGRES_DB: lancerhub_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      # Add named volume for easier data management in dev
      - postgres_dev_data:/var/lib/postgresql/data
    command: >
      postgres
      -c log_statement=all
      -c log_destination=stderr
      -c log_min_messages=info

  redis:
    ports:
      - "6379:6379"  # Expose redis for debugging

  minio:
    ports:
      - "9000:9000"  # Expose S3 API
      - "9001:9001"  # Expose console (already in main compose)
    environment:
      # Development credentials (never use in production)
      MINIO_ROOT_USER: dev_access_key
      MINIO_ROOT_PASSWORD: dev_secret_key

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "dev"]
    volumes:
      # Mount source code for hot reload
      - ../../apps/api/src:/app/src:ro
      - ../../apps/api/package.json:/app/package.json:ro
      - ../../apps/api/tsconfig.json:/app/tsconfig.json:ro
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "dev"]
    volumes:
      # Mount source code for hot reload
      - ../../apps/worker/src:/app/src:ro
      - ../../apps/worker/package.json:/app/package.json:ro
      - ../../apps/worker/tsconfig.json:/app/tsconfig.json:ro
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "dev"]
    volumes:
      # Mount source code for hot reload (Next.js needs write access for generated files)
      - ../../apps/web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1

volumes:
  postgres_dev_data: